services:
  backend:
    image: python:3.10-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8080"
    ports:
      - "8080:8080"
    environment:
      - DEBUG=True
      - CORS_ALLOW_ALL_ORIGINS=True
    volumes:
      - ./backend:/app
      # Using a named volume for pip cache to comply with no anonymous volumes
      - pip_cache:/root/.cache

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      # Using a named volume for node_modules to comply with no anonymous volumes
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pip_cache:
    name: backend_pip_cache
  frontend_node_modules:
    name: frontend_node_modules
